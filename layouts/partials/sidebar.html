<aside class="hidden md:flex flex-col h-full py-8 space-y-2 fixed left-0 top-0 h-screen w-72 border-r border-cyan-500/10 bg-slate-950/90 backdrop-blur-2xl shadow-2xl z-40">
    <div class="px-6 pb-8 pt-16">
        <div class="flex items-center gap-stack-md">
            <div class="w-10 h-10 rounded flex items-center justify-center border border-cyan-400/30 overflow-hidden">
                <img src="{{ "images/profile_pic.jpg" | absURL }}" alt="Mohamed Yasser Profile" class="w-full h-full object-cover"/>
            </div>
            <div>
                <h3 class="text-lg font-black tracking-widest text-cyan-400 uppercase leading-none">MOHAMED YASSER</h3>
                <p class="text-[10px] font-bold text-slate-500 tracking-[0.2em] mt-1">REMOTE SENSING ENGINEER</p>
            </div>
        </div>
    </div>
    <nav class="flex-1">
        <a class="{{ if .IsHome }}bg-cyan-400/10 text-cyan-400 border-l-4 border-cyan-400{{ else }}text-slate-500{{ end }} flex items-center px-6 py-4 font-inter text-sm font-medium hover:bg-slate-900/80 hover:text-cyan-200 transition-all duration-200 ease-in-out transform active:scale-95" href="{{ "/" | absURL }}">
            <span class="material-symbols-outlined mr-unit" data-icon="home">home</span>
            <span>Home</span>
        </a>
        <a class="{{ if eq .Section "portfolio" }}bg-cyan-400/10 text-cyan-400 border-l-4 border-cyan-400{{ else }}text-slate-500{{ end }} flex items-center px-6 py-4 font-inter text-sm font-medium hover:bg-slate-900/80 hover:text-cyan-200 transition-all duration-200 ease-in-out transform active:scale-95" href="{{ "portfolio/" | absURL }}">
            <span class="material-symbols-outlined mr-unit" data-icon="person">person</span>
            <span>Profile</span>
        </a>
        <a class="{{ if eq .Section "projects" }}bg-cyan-400/10 text-cyan-400 border-l-4 border-cyan-400{{ else }}text-slate-500{{ end }} flex items-center px-6 py-4 font-inter text-sm font-medium hover:bg-slate-900/80 hover:text-cyan-200 transition-all duration-200 ease-in-out transform active:scale-95" href="{{ "projects/" | absURL }}">
            <span class="material-symbols-outlined mr-unit" data-icon="work">work</span>
            <span>Projects</span>
        </a>
        <a class="{{ if eq .Section "blog" }}bg-cyan-400/10 text-cyan-400 border-l-4 border-cyan-400{{ else }}text-slate-500{{ end }} flex items-center px-6 py-4 font-inter text-sm font-medium hover:bg-slate-900/80 hover:text-cyan-200 transition-all duration-200 ease-in-out transform active:scale-95" href="{{ "blog/" | absURL }}">
            <span class="material-symbols-outlined mr-unit" data-icon="article">article</span>
            <span>Blog</span>
        </a>
    </nav>
</aside>
