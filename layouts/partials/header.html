<header class="fixed top-0 w-full h-16 flex justify-between items-center px-8 z-50 bg-slate-950/80 backdrop-blur-xl border-b border-cyan-500/20 shadow-[0_4px_20px_rgba(0,0,0,0.5)]">
    <div class="flex items-center gap-stack-md">
        <a href="{{ .Site.BaseURL }}" class="font-mono text-xl font-black text-cyan-400 tracking-tighter uppercase hover:text-cyan-300 transition-colors">MOHAMED YASSER</a>
    </div>

    <!-- Top Navigation Links -->
    <nav class="hidden md:flex items-center gap-8 font-label-caps text-[11px] tracking-widest font-bold">
        <a class="{{ if .IsHome }}text-cyan-400 border-b-2 border-cyan-400 pb-1{{ else }}text-slate-400 hover:text-cyan-200{{ end }} transition-colors" href="{{ .Site.BaseURL }}">PROFILE</a>
        <a class="{{ if eq .Section "projects" }}text-cyan-400 border-b-2 border-cyan-400 pb-1{{ else }}text-slate-400 hover:text-cyan-200{{ end }} transition-colors" href="{{ .Site.BaseURL }}projects/">PROJECTS</a>
        <a class="{{ if eq .Section "blog" }}text-cyan-400 border-b-2 border-cyan-400 pb-1{{ else }}text-slate-400 hover:text-cyan-200{{ end }} transition-colors" href="{{ .Site.BaseURL }}blog/">BLOG</a>
    </nav>

    <div class="flex items-center gap-stack-md text-cyan-400">
        <div class="hidden lg:block mr-4 text-[10px] font-mono text-slate-500" id="global-clock"></div>
        <a href="mailto:mohamed.yasser.ayoub@gmail.com" class="material-symbols-outlined cursor-pointer active:opacity-70 hover:text-cyan-300 transition-colors" data-icon="mail">mail</a>
        <a href="https://github.com/YasserInSpace" target="_blank" class="cursor-pointer active:opacity-70 hover:text-cyan-300 transition-colors text-xl"><i class="fa-brands fa-github"></i></a>
        <button id="mobile-menu-btn" class="md:hidden material-symbols-outlined cursor-pointer active:opacity-70 hover:text-cyan-300 transition-colors" data-icon="menu">menu</button>
    </div>
</header>

<!-- Mobile Navigation Overlay -->
<div id="mobile-menu" class="hidden fixed inset-0 z-40 bg-slate-950/95 backdrop-blur-3xl pt-24 px-8 flex-col gap-8">
    <nav class="flex flex-col gap-6 font-label-caps text-sm tracking-widest font-bold">
        <a class="text-slate-300 hover:text-cyan-400 transition-colors py-2 border-b border-white/5" href="{{ .Site.BaseURL }}">PROFILE</a>
        <a class="text-slate-300 hover:text-cyan-400 transition-colors py-2 border-b border-white/5" href="{{ .Site.BaseURL }}projects/">PROJECTS</a>
        <a class="text-slate-300 hover:text-cyan-400 transition-colors py-2 border-b border-white/5" href="{{ .Site.BaseURL }}blog/">BLOG</a>
    </nav>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const menuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        if(menuBtn && mobileMenu) {
            menuBtn.addEventListener('click', function() {
                mobileMenu.classList.toggle('hidden');
                mobileMenu.classList.toggle('flex');
            });
        }
    });

    function updateClock() {
        const now = new Date();
        const timeString = now.toISOString().replace('T', ' // ').substring(0, 19) + ' UTC';
        const clockEl = document.getElementById('global-clock');
        if(clockEl) clockEl.innerHTML = `<span class="text-slate-400 font-medium">SYS_TIME: ${timeString}</span>`;
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>
