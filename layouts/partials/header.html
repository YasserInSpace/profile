<header class="fixed top-0 w-full h-16 flex justify-between items-center px-8 z-50 bg-slate-950/80 backdrop-blur-xl border-b border-cyan-500/20 shadow-[0_4px_20px_rgba(0,0,0,0.5)]">
    <div class="flex items-center gap-stack-md">
        <span class="font-mono text-xl font-black text-cyan-400 tracking-tighter uppercase">MOHAMED YASSER</span>
        <div class="h-4 w-px bg-white/10 mx-unit hidden md:block"></div>
        <div class="hidden md:flex gap-stack-md font-inter tracking-tight uppercase text-xs font-semibold text-cyan-400" id="global-clock">
        </div>
    </div>
    <div class="flex items-center gap-stack-md text-cyan-400">
        <a href="mailto:mohamed.yasser.ayoub@gmail.com" class="material-symbols-outlined cursor-pointer active:opacity-70 hover:text-cyan-300 transition-colors" data-icon="mail">mail</a>
        <a href="https://github.com/YasserInSpace" target="_blank" class="cursor-pointer active:opacity-70 hover:text-cyan-300 transition-colors font-mono font-bold text-lg">GH</a>
    </div>
</header>
<script>
    function updateClock() {
        const now = new Date();
        const timeString = now.toISOString().replace('T', ' // ').substring(0, 19) + ' UTC';
        const clockEl = document.getElementById('global-clock');
        if(clockEl) clockEl.innerHTML = `<span class="text-slate-400 font-medium">SYS_TIME: ${timeString}</span>`;
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>
