<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ .Site.Params.description }}">
    <meta name="keywords" content="GIS, Remote Sensing, Satellite Imagery, Spatial Analysis, Python">
    <meta property="og:title" content="{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}">
    <meta property="og:description" content="{{ .Site.Params.description }}">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                "on-primary-container": "#006970", "surface-tint": "#00dbe9", "on-error-container": "#ffdad6", "on-tertiary-container": "#855400", "outline-variant": "#3b494b", "secondary-fixed": "#d3e4fe", "primary-container": "#00f0ff", "surface-container-low": "#171b27", "primary-fixed": "#7df4ff", "on-secondary-fixed": "#0b1c30", "on-error": "#690005", "background": "#0e131e", "surface-bright": "#343946", "surface": "#0e131e", "on-secondary": "#213145", "on-tertiary-fixed-variant": "#643f00", "on-secondary-container": "#a9bad3", "on-background": "#dee2f2", "on-primary-fixed-variant": "#004f54", "tertiary-container": "#ffd29c", "primary-fixed-dim": "#00dbe9", "secondary": "#b7c8e1", "secondary-fixed-dim": "#b7c8e1", "surface-container-highest": "#303541", "surface-container": "#1b1f2b", "on-surface-variant": "#b9cacb", "on-tertiary-fixed": "#2a1800", "on-primary-fixed": "#002022", "tertiary-fixed-dim": "#ffb95a", "secondary-container": "#3a4a5f", "tertiary": "#fff4eb", "error-container": "#93000a", "inverse-primary": "#006970", "on-primary": "#00363a", "surface-dim": "#0e131e", "inverse-surface": "#dee2f2", "error": "#ffb4ab", "outline": "#849495", "on-secondary-fixed-variant": "#38485d", "tertiary-fixed": "#ffddb6", "inverse-on-surface": "#2b303c", "on-surface": "#dee2f2", "primary": "#dbfcff", "surface-container-high": "#252a36", "on-tertiary": "#462a00", "surface-container-lowest": "#090e19", "surface-variant": "#303541"
              },
              "borderRadius": { "DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
              "spacing": { "unit": "4px", "stack-sm": "8px", "panel-padding": "20px", "stack-md": "16px", "gutter": "24px", "margin": "40px", "stack-lg": "32px" },
              "fontFamily": { "body-base": ["Inter"], "display-xl": ["Inter"], "label-caps": ["JetBrains Mono"], "data-mono": ["JetBrains Mono"], "headline-md": ["Inter"] },
              "fontSize": {
                "body-base": ["16px", {"lineHeight": "1.6", "letterSpacing": "0", "fontWeight": "400"}],
                "display-xl": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                "label-caps": ["12px", {"lineHeight": "1.0", "letterSpacing": "0.1em", "fontWeight": "700"}],
                "data-mono": ["14px", {"lineHeight": "1.4", "letterSpacing": "0.05em", "fontWeight": "500"}],
                "headline-md": ["24px", {"lineHeight": "1.3", "letterSpacing": "-0.01em", "fontWeight": "600"}]
              }
            }
          }
        }
    </script>
    <style>
        body { background-color: #0e131e; background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0); background-size: 24px 24px; }
        .glass-panel { backdrop-filter: blur(12px); background: rgba(14, 19, 30, 0.6); border: 1px solid rgba(0, 219, 233, 0.1); }
        .border-glow { border-top: 1px solid rgba(0, 219, 233, 0.4); }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .grid-bg { background-image: linear-gradient(rgba(0, 219, 233, 0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0, 219, 233, 0.03) 1px, transparent 1px); background-size: 20px 20px; }
        .scanline { background: linear-gradient(to bottom, transparent 50%, rgba(0, 219, 233, 0.02) 50%); background-size: 100% 4px; }
        
        /* Markdown Styles */
        .markdown-body h1 { @apply font-display-xl text-primary mt-10 mb-6 text-3xl; }
        .markdown-body h2 { @apply font-headline-md text-primary mt-8 mb-4 text-2xl border-b border-surface-tint/20 pb-2; }
        .markdown-body h3 { @apply font-headline-md text-surface-tint mt-6 mb-3 text-xl; }
        .markdown-body h4 { @apply font-headline-md text-secondary mt-4 mb-2 text-lg; }
        .markdown-body p { @apply font-body-base text-on-surface-variant mb-6 leading-relaxed; }
        .markdown-body ul { @apply list-disc list-outside ml-6 text-on-surface-variant mb-6 space-y-2; }
        .markdown-body ol { @apply list-decimal list-outside ml-6 text-on-surface-variant mb-6 space-y-2; }
        .markdown-body li { @apply pl-1; }
        .markdown-body a { @apply text-surface-tint hover:text-primary underline decoration-surface-tint/30 underline-offset-4 transition-colors; }
        .markdown-body strong { @apply text-on-background font-bold; }
        .markdown-body em { @apply text-secondary italic; }
        .markdown-body blockquote { @apply border-l-4 border-surface-tint/50 bg-surface-container/30 pl-4 py-2 mb-6 italic text-on-surface-variant rounded-r; }
        .markdown-body pre { @apply bg-[#0b1120] border border-outline-variant/30 rounded-lg p-4 mb-6 overflow-x-auto text-sm shadow-inner; }
        .markdown-body code { @apply font-data-mono bg-[#0b1120] text-secondary-fixed px-1.5 py-0.5 rounded border border-outline-variant/30 text-[0.9em]; }
        .markdown-body pre code { @apply bg-transparent border-none p-0 text-secondary-fixed; }
        .markdown-body img { @apply rounded-lg border border-surface-tint/20 shadow-lg my-8 max-w-full h-auto; }
        .markdown-body hr { @apply border-outline-variant/20 my-8; }
        .markdown-body table { @apply w-full mb-6 text-left border-collapse; }
        .markdown-body th { @apply border-b border-outline-variant/30 p-3 font-label-caps text-surface-tint uppercase bg-surface-container/50; }
        .markdown-body td { @apply border-b border-outline-variant/10 p-3 text-on-surface-variant; }
        .markdown-body tr:hover td { @apply bg-surface-container/30; }
    </style>
</head>
<body class="font-body-base text-on-background min-h-screen overflow-x-hidden selection:bg-surface-tint selection:text-surface-container-lowest grid-bg">
    {{ partial "header.html" . }}
    
    <main class="pt-16 min-h-screen relative {{ if .IsHome }}flex flex-col items-center justify-center{{ end }}">
        {{ block "main" . }}{{ end }}
    </main>
</body>
</html>
