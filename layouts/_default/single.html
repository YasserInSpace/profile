{{ define "main" }}
<article class="page-single section">
    <header class="page-header">
        <h1 class="page-title">{{ .Title }}</h1>
        {{ if eq .Section "blog" }}
        <div class="post-meta">
            <span class="date">{{ .Date.Format "January 2, 2006" }}</span>
            {{ with .Params.tags }}
            <div class="post-tags">
                {{ range . }}
                <span class="tag">#{{ . }}</span>
                {{ end }}
            </div>
            {{ end }}
        </div>
        {{ end }}
    </header>
    <div class="content markdown-body">
        {{ .Content }}
    </div>
</article>
{{ end }}
