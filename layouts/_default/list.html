{{ define "main" }}
<div class="max-w-4xl mx-auto px-10 py-10 w-full mb-16 mt-8">
    <header class="mb-10">
        <div class="flex items-center space-x-2 mb-2">
            <div class="w-2 h-2 bg-surface-tint"></div>
            <span class="font-label-caps text-label-caps text-surface-tint uppercase tracking-[0.2em]">Archival Access: {{ .Title }}</span>
        </div>
        <h1 class="font-display-xl text-display-xl text-on-background tracking-tighter uppercase">{{ .Title }}</h1>
    </header>

    <div class="space-y-8">
        {{ range .Pages }}
            <article class="glass-panel group relative overflow-hidden rounded-lg p-6 transition-all hover:border-surface-tint/40">
                <div class="flex flex-col md:flex-row gap-8">
                    <div class="flex-1 flex flex-col">
                        <div class="flex justify-end items-start mb-4">
                            {{ if .Date }}
                            <span class="font-data-mono text-xs text-slate-500">{{ .Date.Format "2006.01.02" }}</span>
                            {{ end }}
                        </div>
                        <h2 class="font-headline-md text-primary mb-3">{{ .Title }}</h2>
                        <p class="font-body-base text-on-surface-variant mb-6 line-clamp-3">
                            {{ .Summary }}
                        </p>
                        <div class="mt-auto flex items-center justify-between">
                            <div class="flex gap-2">
                                {{ range first 2 .Params.tags }}
                                <span class="px-2 py-0.5 rounded border border-slate-700 font-label-caps text-[10px] text-slate-400 uppercase">{{ . }}</span>
                                {{ end }}
                            </div>
                            <a class="text-surface-tint font-label-caps text-xs flex items-center gap-2 hover:gap-3 transition-all" href="{{ .RelPermalink }}">
                                READ MORE <span class="material-symbols-outlined text-sm" data-icon="arrow_forward">arrow_forward</span>
                            </a>
                        </div>
                    </div>
                </div>
            </article>
            {{ end }}
    </div>
</div>
{{ end }}
